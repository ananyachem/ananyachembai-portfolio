<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Ananya Chembai — email, phone, and a contact form.">
    <title>Contact — Ananya Chembai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <div class="bg" aria-hidden="true">
        <span class="blob b1"></span>
        <span class="blob b2"></span>
        <span class="blob b3"></span>
        <span class="blob b4"></span>
        <span class="blob b5"></span>
        <span class="blob b6"></span>
        <span class="blob b7"></span>
        <span class="blob b8"></span>
    </div>


    <div id="header">
        <div class="container">

    <!-- ---------NAV BAR--------- -->
            <nav>
                <a href="../index.html"><img src="../assets/ananya_logo.png" class="logo"></a>
                <ul id="nav-menu">
                    <i class="fas fa-times" id="close-icon"></i>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../pages/about.html">About</a></li>
                    <li><a href="../pages/portfolio.html">Projects</a></li>
                    <li><a href="../pages/resume.html">Resume</a></li>
                    <li><a href="../pages/contact.html" class="active">Contact</a></li>
                </ul>
                <i class="fas fa-bars" id="menu-icon"></i>
            </nav>

    <!-- ---------CONTACT SECTION--------- -->
            <div id="contact">
                <div class="container">
                    <div class="contact-container">

                        <div class="contact-left">
                            <h1 class="sub-title">Contact Me</h1>
                            <p>Got a project, an idea, or a really good cookie recipe? My inbox is always open!</p>
                            <p><i class="fa-solid fa-paper-plane"></i>chembaiananya@gmail.com</p>
                            <p><i class="fa-solid fa-phone"></i>(412)-450-7128</p>
                            <div class="social-icons">
                                <a href="https://www.instagram.com/holy.sheet.cake/" target="_blank" rel="noopener"><i class="fa-brands fa-instagram"></i></a>
                                <a href="https://github.com/ananyachem" target="_blank" rel="noopener"><i class="fa-brands fa-github"></i></a>
                                <a href="https://www.linkedin.com/in/ananyachembai/" target="_blank" rel="noopener"><i class="fa-brands fa-linkedin"></i></a>
                            </div>
                        </div>

                        <div class="contact-right">
                            <form action="https://formspree.io/f/mnnvpgog" method="POST">
                                <input type="text" name="Name" placeholder="Your Name" required>
                                <input type="email" name="Email" placeholder="Your Email" required>
                                <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
                                <button type="submit" class="project-btn">Send Message</button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- ---------FOOTER--------- -->
    <footer>
        <div class="social-icons">
            <a href="https://www.instagram.com/holy.sheet.cake/" target="_blank" rel="noopener" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://github.com/ananyachem" target="_blank" rel="noopener" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
            <a href="https://www.linkedin.com/in/ananyachembai/" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
        </div>
        <p>&copy; 2026 Ananya Chembai</p>
    </footer>

    <script>
        const menuIcon = document.getElementById('menu-icon');
        const closeIcon = document.getElementById('close-icon');
        const navMenu = document.getElementById('nav-menu');

        menuIcon.addEventListener('click', () => {
            navMenu.classList.add('open');
        });
        closeIcon.addEventListener('click', () => {
            navMenu.classList.remove('open');
        });
    </script>

    <script src="../script.js"></script>
</body>
</html>
